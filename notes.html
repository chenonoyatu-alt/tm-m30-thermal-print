<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>よくあるミス - TM-m30</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 24px; color:#111; background:#fafafa; }
    .card { background:white; border:1px solid #e5e5e5; border-radius:12px; padding:16px; margin:14px 0; }
    a.btn { display:inline-block; padding:10px 14px; border-radius:10px; background:#111; color:white; text-decoration:none; }
    .muted { color:#666; font-size:14px; }
    ul { margin: 8px 0 0 18px; }
  </style>
</head>
<body>
  <h1 style="margin:0 0 10px;">よくあるミス</h1>
  <p class="muted">トラブル例・確認ポイント（メモ用）</p>

  <div class="card">
    <h2>🛑 画像が小さく/大きく出る</h2>
    <ul>
      <li>印刷ダイアログの「用紙サイズ」「スケール」を確認</li>
      <li>ブラウザの「余白あり」になっていないか確認</li>
      <li>最初はテスト印刷（1枚）</li>
    </ul>
  </div>

  <div class="card">
    <h2>🛑 位置がズレる（回転・余白）</h2>
    <ul>
      <li>画像が縦/横どちら想定か再確認</li>
      <li>印刷プレビューで回転がないか確認</li>
      <li>余白設定を最小にできるか試す</li>
    </ul>
  </div>

  <div class="card">
    <h2>🛑 うまく印刷できない</h2>
    <ul>
      <li>プリンターの電源・ケーブル・状態ランプ</li>
      <li>PCの既定プリンターがTM-m30になっているか</li>
      <li>ブラウザ再起動、印刷ダイアログの再確認</li>
    </ul>
  </div>

  <div class="card">
    <a class="btn" href="index.html">← トップへ</a>
  </div>
</body>
</html>
