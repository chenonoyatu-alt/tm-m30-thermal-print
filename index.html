<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TM-m30 熱印刷サポート</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 24px; color:#111; background:#fafafa; }
    header { display:flex; gap:12px; align-items:baseline; justify-content:space-between; margin-bottom:18px; }
    .card { background:white; border:1px solid #e5e5e5; border-radius:12px; padding:16px; margin:14px 0; }
    .btn { display:inline-block; padding:10px 14px; border-radius:10px; background:#111; color:white; text-decoration:none; }
    a.btn.secondary { background:#fff; color:#111; border:1px solid #ddd; }
    .muted { color:#666; font-size: 14px; }
    img { max-width: 100%; height: auto; }
    ul { margin: 8px 0 0 18px; }
    select, input[type="file"] { width: 100%; padding:10px; border-radius:10px; border:1px solid #ddd; background:white; }
  </style>
</head>
<body>
  <header>
    <h1 style="margin:0;">TM-m30 熱印刷サポート</h1>
    <div class="muted">簡単手順（画像選択→印刷）</div>
  </header>

  <div class="card">
    <h2>① 画像選択</h2>
    <p class="muted">まず画像を選び、印刷ページへ進みます。</p>

    <!-- ブラウザの「印刷」はJSがなくても動くように、簡易UI -->
    <label class="muted" for="file">印刷する画像を選択（JPG/PNG推奨）</label>
    <input id="file" type="file" accept="image/*" />

    <p style="margin:12px 0 0; display:flex; gap:10px; flex-wrap:wrap;">
      <button id="toPrint" class="btn" type="button">印刷へ進む</button>
      <a class="btn secondary" href="notes.html">よくあるミス</a>
    </p>
    <div id="status" class="muted" style="margin-top:10px;"></div>
  </div>

  <div class="card">
    <h2>② 印刷</h2>
    <p class="muted">印刷ページは、選んだ画像を使って「ブラウザ印刷」を呼び出します。</p>
    <a class="btn" href="print.html">手順を見る</a>
  </div>

  <div class="card">
    <h2>③ よくあるミス</h2>
    <p class="muted">トラブル例・対処・保管メモ。</p>
    <a class="btn secondary" href="notes.html">開く</a>
  </div>

  <script>
    // 画像を選んだら print.html へ遷移し、画像をURLパラメータ化します（小さめ前提）
    const fileInput = document.getElementById('file');
    const btn = document.getElementById('toPrint');
    const status = document.getElementById('status');

    btn.addEventListener('click', async () => {
      status.textContent = '';
      const file = fileInput.files?.[0];
      if (!file) {
        status.textContent = '画像を選択してください。';
        return;
      }

      // 画像をDataURLにして渡します（URLに載せる方式）
      // 画像が大きいと失敗することがあるので、その場合は後で改善します。
      const dataUrl = await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
      });

      // print.htmlへ遷移
      const url = `print.html?img=${encodeURIComponent(dataUrl)}`;
      window.location.href = url;
    });
  </script>
</body>
</html>
